<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learnfy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#030303;
      --text:#f4ede4;
      --gold:#9f7447;
      --gold-soft:#d2b08a;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      height:100%;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 48%, rgba(159,116,71,0.08), transparent 14%),
        radial-gradient(circle at 50% 52%, rgba(255,214,170,0.025), transparent 24%),
        linear-gradient(180deg, #020202 0%, #040404 48%, #020202 100%);
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:0.022;
      pointer-events:none;
      background-image:
        radial-gradient(circle at 20% 20%, #fff 0.7px, transparent 1px),
        radial-gradient(circle at 80% 30%, #fff 0.7px, transparent 1px),
        radial-gradient(circle at 35% 70%, #fff 0.7px, transparent 1px),
        radial-gradient(circle at 70% 80%, #fff 0.7px, transparent 1px);
      background-size:220px 220px;
      animation: driftNoise 24s linear infinite;
    }

    .ambient{
      position:absolute;
      width:420px;
      height:420px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(159,116,71,0.12), transparent 62%);
      filter:blur(18px);
      left:50%;
      top:52%;
      transform:translate(-50%,-50%);
      pointer-events:none;
      animation: ambientPulse 7s ease-in-out infinite;
    }

    .ambient-2{
      position:absolute;
      width:240px;
      height:240px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,220,180,0.05), transparent 68%);
      filter:blur(24px);
      left:50%;
      top:40%;
      transform:translate(-50%,-50%);
      pointer-events:none;
      animation: ambientFloat 9s ease-in-out infinite;
    }

    .frame{
      width:min(1200px, 92vw);
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      padding:80px 24px;
      z-index:2;
    }

    .hero{
      width:min(980px, 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      transform:translateY(-30px);
      animation: fadeUp 1.4s cubic-bezier(.2,.8,.2,1) both;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:36px;
      animation: fadeUp 1.2s cubic-bezier(.2,.8,.2,1) both;
      animation-delay: 0.15s;
    }

    .brand-mark{
      width:48px;
      height:48px;
      border-radius:50%;
      border:1px solid rgba(159,116,71,0.45);
      position:relative;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 0 24px rgba(159,116,71,0.08);
      background:rgba(255,255,255,0.01);
      animation: logoBreath 5s ease-in-out infinite;
    }

    .brand-mark::before,
    .brand-mark::after{
      content:"";
      position:absolute;
      top:11px;
      width:11px;
      height:23px;
      border-radius:18px;
      background:linear-gradient(180deg, #e0c29c 0%, #b88858 100%);
      box-shadow:0 0 10px rgba(184,136,88,0.10);
    }

    .brand-mark::before{
      left:11px;
      transform:skew(-16deg);
    }

    .brand-mark::after{
      right:11px;
      transform:skew(16deg);
    }

    .brand-text{
      font-size:clamp(28px, 3vw, 40px);
      letter-spacing:4px;
      font-weight:500;
      color:#f3ece3;
    }

    .vertical-line{
      width:1px;
      height:100px;
      background:linear-gradient(180deg, rgba(255,255,255,0.14), rgba(159,116,71,0.10), transparent);
      margin-bottom:30px;
      opacity:0.65;
      transform-origin: top center;
      animation:
        fadeUp 1.3s cubic-bezier(.2,.8,.2,1) both,
        lineGlow 4.5s ease-in-out infinite;
      animation-delay: 0.28s, 1.5s;
    }

    .headline{
      font-family:'Cormorant Garamond', serif;
      font-weight:500;
      font-size:clamp(42px, 5.4vw, 82px);
      line-height:1.04;
      letter-spacing:-1px;
      color:#f5eee6;
      text-shadow:0 0 24px rgba(255,255,255,0.02);
      max-width:1100px;
      margin-top:10px;
      animation: fadeUp 1.35s cubic-bezier(.2,.8,.2,1) both;
      animation-delay: 0.35s;
    }

    .headline span{
      display:block;
    }

    .coming{
      margin-top:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:280px;
      height:68px;
      padding:0 34px;
      border-radius:999px;
      border:1px solid rgba(159,116,71,0.55);
      color:#f2e5d5;
      font-size:12px;
      font-weight:500;
      letter-spacing:6px;
      text-transform:uppercase;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00)),
        linear-gradient(180deg, rgba(159,116,71,0.10), rgba(159,116,71,0.03));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 8px 30px rgba(0,0,0,0.35),
        0 0 30px rgba(159,116,71,0.08);
      position:relative;
      overflow:hidden;
      animation:
        fadeUp 1.45s cubic-bezier(.2,.8,.2,1) both,
        buttonBreath 5s ease-in-out infinite;
      animation-delay: 0.5s, 1.8s;
    }

    .coming::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.03);
      pointer-events:none;
    }

    .coming::after{
      content:"";
      position:absolute;
      top:-120%;
      left:-35%;
      width:28%;
      height:300%;
      transform:rotate(22deg);
      background:linear-gradient(
        180deg,
        rgba(255,255,255,0),
        rgba(255,255,255,0.06),
        rgba(255,255,255,0)
      );
      animation: shimmer 7s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(22px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes ambientPulse{
      0%,100%{
        transform:translate(-50%,-50%) scale(1);
        opacity:0.9;
      }
      50%{
        transform:translate(-50%,-50%) scale(1.08);
        opacity:1;
      }
    }

    @keyframes ambientFloat{
      0%,100%{
        transform:translate(-50%,-50%) translateY(0px);
      }
      50%{
        transform:translate(-50%,-50%) translateY(-12px);
      }
    }

    @keyframes buttonBreath{
      0%,100%{
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.02) inset,
          0 8px 30px rgba(0,0,0,0.35),
          0 0 24px rgba(159,116,71,0.06);
      }
      50%{
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.02) inset,
          0 8px 30px rgba(0,0,0,0.35),
          0 0 36px rgba(159,116,71,0.12);
      }
    }

    @keyframes shimmer{
      0%, 72%, 100%{
        transform:translateX(0) rotate(22deg);
        opacity:0;
      }
      78%{
        opacity:1;
      }
      92%{
        transform:translateX(520%) rotate(22deg);
        opacity:0;
      }
    }

    @keyframes logoBreath{
      0%,100%{
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.02) inset,
          0 0 24px rgba(159,116,71,0.07);
      }
      50%{
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.02) inset,
          0 0 34px rgba(159,116,71,0.13);
      }
    }

    @keyframes lineGlow{
      0%,100%{
        opacity:0.55;
      }
      50%{
        opacity:0.82;
      }
    }

    @keyframes driftNoise{
      0%{
        transform:translate3d(0,0,0);
      }
      50%{
        transform:translate3d(-6px,4px,0);
      }
      100%{
        transform:translate3d(0,0,0);
      }
    }

    @media (max-width: 900px){
      .frame{
        padding:60px 22px;
      }

      .brand{
        margin-bottom:30px;
      }

      .vertical-line{
        height:84px;
        margin-bottom:24px;
      }

      .coming{
        min-width:240px;
        height:62px;
        letter-spacing:5px;
      }
    }

    @media (max-width: 640px){
      .frame{
        padding:42px 18px;
      }

      .hero{
        transform:translateY(-10px);
      }

      .brand{
        gap:10px;
        margin-bottom:26px;
      }

      .brand-mark{
        width:42px;
        height:42px;
      }

      .brand-mark::before,
      .brand-mark::after{
        top:10px;
        width:10px;
        height:20px;
      }

      .brand-mark::before{ left:9px; }
      .brand-mark::after{ right:9px; }

      .brand-text{
        letter-spacing:3px;
        font-size:26px;
      }

      .vertical-line{
        height:72px;
        margin-bottom:22px;
      }

      .headline{
        font-size:clamp(34px, 8.4vw, 56px);
        line-height:1.08;
      }

      .coming{
        min-width:220px;
        height:58px;
        padding:0 24px;
        letter-spacing:4px;
        font-size:11px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient"></div>
  <div class="ambient-2"></div>

  <main class="frame">
    <section class="hero">
      <div class="brand">
        <div class="brand-mark"></div>
        <div class="brand-text">LEARNFY</div>
      </div>

      <div class="vertical-line"></div>

      <h1 class="headline">
        <span>Turning Learning</span>
        <span>Into Skills</span>
      </h1>

      <div class="coming">Coming Soon</div>
    </section>
  </main>
</body>
</html>
